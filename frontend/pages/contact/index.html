<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medi-Mate — Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <!-- LEFT: Nurse + Info -->
  <div class="left">
    <div class="bg-circle1"></div>
    <div class="bg-circle2"></div>
    <svg class="bg-dots" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
      <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="2" fill="white"/>
      </pattern>
      <rect width="200" height="400" fill="url(#dots)"/>
    </svg>
 
    <!-- Nurse Illustration -->
    <div class="nurse-svg">
      <svg width="180" height="260" viewBox="0 0 180 260" xmlns="http://www.w3.org/2000/svg">
        <!-- shadow -->
        <ellipse cx="90" cy="252" rx="48" ry="7" fill="rgba(0,0,0,0.12)"/>
        <!-- head -->
        <ellipse cx="90" cy="80" rx="34" ry="36" fill="#FDDBB4"/>
        <!-- ears -->
        <ellipse cx="74" cy="85" rx="9" ry="10" fill="#FDDBB4"/>
        <ellipse cx="106" cy="85" rx="9" ry="10" fill="#FDDBB4"/>
        <!-- nurse cap base -->
        <rect x="60" y="54" width="60" height="20" rx="10" fill="#fff"/>
        <rect x="64" y="46" width="52" height="18" rx="9" fill="#fff"/>
        <rect x="70" y="40" width="40" height="14" rx="7" fill="#ECFFDC"/>
        <!-- cross on cap -->
        <rect x="74" y="36" width="32" height="11" rx="5.5" fill="#50C878"/>
        <line x1="90" y1="36" x2="90" y2="47" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="84" y1="41" x2="96" y2="41" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <!-- eyes -->
        <ellipse cx="78" cy="84" rx="5" ry="5.5" fill="#fff"/>
        <ellipse cx="102" cy="84" rx="5" ry="5.5" fill="#fff"/>
        <ellipse cx="78.8" cy="84" rx="3.2" ry="3.5" fill="#5B3A29"/>
        <ellipse cx="102.8" cy="84" rx="3.2" ry="3.5" fill="#5B3A29"/>
        <ellipse cx="79.6" cy="82.8" rx="1.1" ry="1.2" fill="white"/>
        <ellipse cx="103.6" cy="82.8" rx="1.1" ry="1.2" fill="white"/>
        <!-- smile -->
        <path d="M83 95 Q90 101 97 95" fill="none" stroke="#D4856A" stroke-width="2" stroke-linecap="round"/>
        <!-- cheeks -->
        <ellipse cx="80" cy="91" rx="3.5" ry="2" fill="#F4A58A" opacity="0.7"/>
        <ellipse cx="100" cy="91" rx="3.5" ry="2" fill="#F4A58A" opacity="0.7"/>
        <!-- hair -->
        <path d="M76 72 Q90 66 104 72" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
        <ellipse cx="90" cy="66" rx="18" ry="6" fill="#D4A574"/>
        <path d="M72 73 Q68 68 64 70" fill="none" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
        <path d="M108 73 Q112 68 116 70" fill="none" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
        <!-- scrubs body -->
        <rect x="58" y="114" width="64" height="70" rx="14" fill="#50C878"/>
        <!-- scrubs detail panels -->
        <rect x="68" y="116" width="20" height="44" rx="6" fill="#ECFFDC"/>
        <rect x="92" y="116" width="20" height="44" rx="6" fill="#ECFFDC"/>
        <!-- pocket with cross -->
        <rect x="76" y="120" width="28" height="14" rx="5" fill="#50C878"/>
        <rect x="80" y="122" width="8" height="10" rx="4" fill="white"/>
        <line x1="80" y1="127" x2="80" y2="132" stroke="#50C878" stroke-width="2" stroke-linecap="round"/>
        <line x1="77" y1="129.5" x2="83" y2="129.5" stroke="#50C878" stroke-width="2" stroke-linecap="round"/>
        <!-- arms -->
        <rect x="36" y="118" width="22" height="50" rx="11" fill="#FDDBB4"/>
        <rect x="122" y="118" width="22" height="50" rx="11" fill="#FDDBB4"/>
        <ellipse cx="47" cy="168" rx="12" ry="11" fill="#FDDBB4"/>
        <ellipse cx="133" cy="168" rx="12" ry="11" fill="#FDDBB4"/>
        <!-- legs -->
        <rect x="66" y="182" width="20" height="52" rx="10" fill="#3a9658"/>
        <rect x="94" y="182" width="20" height="52" rx="10" fill="#3a9658"/>
        <!-- shoes -->
        <ellipse cx="76" cy="234" rx="12" ry="8" fill="#FDDBB4"/>
        <ellipse cx="104" cy="234" rx="12" ry="8" fill="#FDDBB4"/>
        <!-- stethoscope -->
        <circle cx="134" cy="160" r="7" fill="#ECFFDC" stroke="#50C878" stroke-width="1.5"/>
        <circle cx="134" cy="167" r="6" fill="#ddd" stroke="#aaa" stroke-width="1"/>
        <path d="M134 160 Q140 153 146 156" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M134 160 Q128 153 122 156" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="134" cy="167" r="3" fill="#50C878"/>
      </svg>
    </div>
 
    <div class="left-text">
      <h3>We're here to help!</h3>
      <p>Your Medi Mate care team,<br>always by your side.</p>
      <div class="status-pill">
        <div class="sdot" id="sdot"></div>
        <span id="stext">Checking...</span>
      </div>
    </div>
  </div>
 
  <!-- RIGHT: Contact Info -->
  <div class="right">
    <h2>Get in Touch</h2>
    <p class="sub">Medi Mate support typically responds within 2 hours.</p>
 
    <div class="info-item">
      <!-- <div class="ibox">
        <svg viewBox="0 0 24 24"><path d="M12 21s-8-5.5-8-11a8 8 0 1 1 16 0c0 5.5-8 11-8 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      </div> -->
      <!-- <div class="itext">
        <h4>Our office</h4>
        <p>Wellness Tower, Suite 101</p>
      </div> -->
    </div>
 
    <div class="info-item" id="emailRow" style="cursor:pointer">
      <div class="ibox">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      </div>
      <div class="itext">
        <h4>Email us</h4>
        <a href="mailto:hello@medimate.ai">hello@medimate.ai</a>
        <span id="chint" style="font-size:11px;color:#50C878;margin-left:6px;display:none">· click to copy</span>
      </div>
    </div>
 
    <div class="info-item">
      <div class="ibox">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <div class="itext">
        <h4>Call support</h4>
        <p>+91 MEDI-MATE</p>
      </div>
    </div>
 
    <div class="btns">
      <!-- <button class="btn-primary" id="chatBtn">Start live chat</button> -->
      <button class="btn-outline" id="msgBtn">GO BACK</button>
    </div>
  </div>
 
  <!-- Toast -->
  <div class="toast" id="toast"></div>
 
  <!-- Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="closex" id="closeMod">&#x2715;</button>
      <h3>Send us a message</h3>
      <p class="msub">We'll reply within 2 hours.</p>
      <input type="text" id="mname" placeholder="Your name"/>
      <input type="email" id="memail" placeholder="Your email"/>
      <textarea id="mbody" rows="4" placeholder="How can we help you?"></textarea>
      <div class="mbtns">
        <button class="mcancel" id="cancelMod">Cancel</button>
        <button class="msend" id="doSend">Send message</button>
      </div>
    </div>
  </div>
 
</div>

 <script src="app.js"></script>
</body>
</html>
