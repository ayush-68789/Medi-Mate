<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genetics | MediMate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <div class="head">
            <img src="assets/logo.jpeg" alt="logo" class="logoimg">
            <span class="logoheading">MediMate - Genetics</span>
        </div>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container">
        <div class="icon">🧬</div>
        <h1>Genetics</h1>
        <p>Your genes carry important health information and determine traits like height, eye color, and more.</p>
        <p>Some diseases can be inherited through DNA, which is why family medical history matters.</p>

        <button id="back-btn">← Go Back</button>
    </div>

    <!-- 🔥 SCRIPT -->
    <script>
        const backbtn = document.getElementById("back-btn");

        backbtn.addEventListener("click", () => {
            window.history.back();   // ✅ better navigation
        });
    </script>

</body>
</html>
