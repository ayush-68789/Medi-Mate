<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | MediMate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <div class="head">
            <img src="assets/logo.jpeg" alt="logo" class="logoimg">
            <span class="logoheading">MediMate - Reports</span>
        </div>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container">
        <div class="icon">📋</div>
        <h1>Medical Reports</h1>
        <p>Medical reports help track your health over time and detect patterns.</p>
        <p>Always keep your reports safe and review them regularly with your doctor.</p>

        <button id="back-btn">← Go Back</button>
    </div>

    <!-- 🔥 SCRIPT -->
    <script>
        document.getElementById("back-btn").addEventListener("click", () => {
            window.history.back();   // ✅ clean & consistent
        });
    </script>

</body>
</html>
