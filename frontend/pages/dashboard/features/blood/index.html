<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood | MediMate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <div class="head">
            <img src="assets/logo.jpeg" alt="logo" class="logoimg">
            <span class="logoheading">MediMate - Blood</span>
        </div>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container">
        <div class="icon">🩸</div>
        <h1>Blood Health</h1>
        <p>Blood carries oxygen and nutrients throughout your body.</p>
        <p>Donating blood can save up to 3 lives and supports better circulation.</p>

        <button id="back-btn">← Go Back</button>
    </div>

    <!-- 🔥 SCRIPT -->
    <script>
        const backbtn = document.getElementById("back-btn");

        backbtn.addEventListener("click", () => {
            window.history.back();   // ✅ better navigation
        });
    </script>

</body>
</html>
