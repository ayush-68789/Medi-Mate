<!DOCTYPE html>

    <title>Lab Tests | MediMate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔥 NAVBAR -->

        <div class="head">

            <span class="logoheading">MediMate - Lab Tests</span>
        </div>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container">
        <div class="icon">🧪</div>

        backbtn.addEventListener("click", () => {
            window.history.back();   // ✅ better UX
